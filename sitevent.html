<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABYSSE</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:'Press Start 2P', monospace;
  text-align:center;
  overflow:hidden;
}
.section{display:none;padding:20px;}
.active{display:block;}

button{
  margin-top:20px;
  padding:10px;
  background:black;
  color:white;
  border:2px solid white;
  cursor:pointer;
}
button:hover{
  background:white;
  color:black;
}

input{
  margin-top:20px;
  padding:10px;
  background:black;
  color:white;
  border:2px solid white;
}

.glitch{
  animation:glitch 0.2s infinite;
}
@keyframes glitch{
  0%{opacity:1}
  50%{opacity:0.4}
  100%{opacity:1}
}

.bigLetter{
  font-size:120px;
  margin-top:40px;
  animation:blink 1s infinite;
}
@keyframes blink{
  0%{opacity:1}
  50%{opacity:0}
  100%{opacity:1}
}

.grid, .cams{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  margin-top:20px;
}

.square{
  width:80px;
  height:80px;
  border:2px solid white;
  margin:10px;
  cursor:pointer;
  background:black;
  transition:background 0.2s;
}

.camera{
  width:100px;
  height:100px;
  border:2px solid white;
  margin:15px;
  cursor:pointer;
  background:black;
}
</style>
</head>
<body>

<h1>ABYSSE</h1>

<!-- INTRO -->
<div class="section active" id="s1">
<div id="text1"></div>
<input id="answer1" placeholder="Réponse...">
<br>
<button onclick="check1()">VALIDER</button>
<div id="err1"></div>
</div>

<!-- TRANSITION -->
<div class="section" id="transition">
<div class="glitch" style="margin-top:200px;">SIGNAL EN COURS...</div>
</div>

<!-- FNAF -->
<div class="section" id="s2">
<h2>Clique quand ça apparaît</h2>
<div class="cams" id="cams"></div>
<div id="score2">0 / 10</div>
</div>

<!-- COFFRES -->
<div class="section" id="s3">
<h2>Trouve le bon coffre</h2>
<div class="grid" id="grid3"></div>
<div id="attempt3">Tentatives : 5</div>
</div>

<!-- MEMOIRE -->
<div class="section" id="s4">
<h2>Séquence</h2>
<div class="grid" id="grid4">
<div class="square"></div>
<div class="square"></div>
<div class="square"></div>
<div class="square"></div>
</div>
<div id="score4">0 / 10</div>
</div>

<!-- CALCUL -->
<div class="section" id="s5">
<h2>Calcul final</h2>
<div id="q5"></div>
<input id="a5" type="number">
<div id="time5"></div>
<div id="score5">0 / 15</div>
</div>

<!-- FINAL -->
<div class="section" id="final">
<h2>Félicitations</h2>
<div class="bigLetter" id="finalWord"></div>
<button onclick="redirect()">Continuer</button>
</div>

<!-- SONS -->
<audio id="glitchSound" src="https://cdn.pixabay.com/audio/2022/03/15/audio_5b8b9a8d7f.mp3"></audio>
<audio id="doorSound" src="https://cdn.pixabay.com/audio/2022/03/15/audio_6c99b3f9c4.mp3"></audio>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
// FIREBASE
firebase.initializeApp({
  apiKey: "AIzaSyCLUNQhx8h0dHmiI3rqJ6QPuDju0Aa4zAo",
  authDomain: "trailer-90acb.firebaseapp.com",
  databaseURL: "https://trailer-90acb-default-rtdb.firebaseio.com",
  projectId: "trailer-90acb"
});
const db = firebase.database();

// GLOBAL
let letters="";
let timerInterval=null;

function show(id){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function transition(next){
  show("transition");
  document.getElementById("glitchSound").play();
  setTimeout(()=>show(next),2000);
}

function save(letter){
  letters+=letter;
  db.ref("lettres/"+letter).set(true);
}

// INTRO
const introText="Bonjour... à qui est destiné ce message ?";
let introIndex=0;
function typeIntro(){
  document.getElementById("text1").innerHTML+=introText[introIndex];
  if(introIndex<introText.length-1){
    introIndex++;
    setTimeout(typeIntro,30);
  }
}
typeIntro();

function check1(){
  const val=document.getElementById("answer1").value.toLowerCase();
  if(val.includes("gardien")){
    save("I");
    transition("s2");
    startFnaf();
  }else{
    document.getElementById("err1").innerText="Erreur...";
  }
}

// FNAF
let score2=0, current=0;
function startFnaf(){
  score2=0;
  document.getElementById("score2").innerText="0 / 10";
  const cams=document.getElementById("cams");
  cams.innerHTML="";
  for(let i=0;i<4;i++){
    const c=document.createElement("div");
    c.className="camera";
    c.onclick=()=>clickFnaf(i);
    cams.appendChild(c);
  }
  spawnFnaf();
}
function spawnFnaf(){
  current=Math.floor(Math.random()*4);
  document.querySelectorAll(".camera").forEach((c,i)=>{
    c.style.background=(i===current?"white":"black");
  });
}
function clickFnaf(id){
  if(id===current){
    score2++;
    document.getElementById("score2").innerText=score2+" / 10";
    if(score2>=10){
      save("S");
      transition("s3");
      startCoffre();
    }else{
      spawnFnaf();
    }
  }
}

// COFFRE
let good, attempts;
function startCoffre(){
  const grid=document.getElementById("grid3");
  grid.innerHTML="";
  attempts=5;
  document.getElementById("attempt3").innerText="Tentatives : 5";
  good=Math.floor(Math.random()*30);
  for(let i=0;i<30;i++){
    const s=document.createElement("div");
    s.className="square";
    s.onclick=()=>clickCoffre(i);
    grid.appendChild(s);
  }
}
function clickCoffre(id){
  if(id===good){
    save("A");
    transition("s4");
    startMemo();
  }else{
    attempts--;
    document.getElementById("attempt3").innerText="Tentatives : "+attempts;
    if(attempts<=0) startCoffre();
  }
}

// MEMOIRE NOIR BLANC
let seq=[], user=[], score4=0, playing=false;

function startMemo(){
  seq=[];
  user=[];
  score4=0;
  document.getElementById("score4").innerText="0 / 10";
  nextSeq();
}

function nextSeq(){
  user=[];
  seq.push(Math.floor(Math.random()*4));
  playSeq();
}

function playSeq(){
  playing=true;
  const squares=document.querySelectorAll("#grid4 .square");
  let i=0;
  const interval=setInterval(()=>{
    if(i>0) squares[seq[i-1]].style.background="black";
    if(i<seq.length){
      squares[seq[i]].style.background="white";
      i++;
    }else{
      clearInterval(interval);
      playing=false;
    }
  },600);
}

document.getElementById("grid4").onclick=function(e){
  if(playing) return;
  if(!e.target.classList.contains("square")) return;

  const squares=[...this.children];
  const index=squares.indexOf(e.target);

  e.target.style.background="white";
  setTimeout(()=>e.target.style.background="black",200);

  user.push(index);

  if(user[user.length-1]!==seq[user.length-1]){
    startMemo();
    return;
  }

  if(user.length===seq.length){
    score4++;
    document.getElementById("score4").innerText=score4+" / 10";
    if(score4>=10){
      save("M");
      transition("s5");
      startCalc();
    }else{
      nextSeq();
    }
  }
};

// CALCUL
let qs=[], cur=0, score5=0, time=20;

function startCalc(){
  qs=[]; cur=0; score5=0; time=20;
  document.getElementById("score5").innerText="0 / 15";

  for(let i=0;i<14;i++){
    let a=Math.floor(Math.random()*20);
    let b=Math.floor(Math.random()*10);
    qs.push({q:`${a}+${b}`,a:a+b});
  }
  qs.push({q:"on naît avec rien + on repart avec ...",a:0});

  nextQ();

  timerInterval=setInterval(()=>{
    time--;
    document.getElementById("time5").innerText="Temps : "+time;
    if(time<=0){
      clearInterval(timerInterval);
      startCalc();
    }
  },1000);
}

function nextQ(){
  document.getElementById("q5").innerText=qs[cur].q;
}

document.getElementById("a5").addEventListener("keydown",function(e){
  if(e.key==="Enter"){
    if(parseInt(this.value)===qs[cur].a){
      score5++;
      document.getElementById("score5").innerText=score5+" / 15";
      time+=5;
      cur++;
      if(cur>=qs.length){
        clearInterval(timerInterval);
        save("C");
        show("final");
        document.getElementById("finalWord").innerText=letters;
      }else nextQ();
    }
    this.value="";
  }
});

// REDIRECTION
function redirect(){
  document.getElementById("doorSound").play();
  document.body.classList.add("glitch");
  setTimeout(()=>{
    window.location.href="https://bachamoha05-rgb.github.io/finalstep/";
  },2500);
}

// ANTI DEVTOOLS
document.addEventListener("contextmenu",e=>e.preventDefault());
document.addEventListener("keydown",e=>{
  if(e.key==="F12") e.preventDefault();
  if(e.ctrlKey&&e.shiftKey&&e.key==="I") e.preventDefault();
});
</script>
</body>
</html>
