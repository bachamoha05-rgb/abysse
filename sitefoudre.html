<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Les Épreuves</title>




<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

*, *::before, *::after { box-sizing: border-box; }

body {
  background: black;
  color: white;
  font-family: 'Press Start 2P', monospace;
  text-align: center;
  margin: 0;
  padding: 0;
  min-height: 100vh;
}

.epreuve { display: none; animation: fadeIn 1s ease; }
.epreuve.active { display: block; }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

.btn-next {
  margin-top: 30px;
  padding: 16px 24px;
  font-family: 'Press Start 2P', monospace;
  font-size: 14px;
  background: black;
  color: white;
  border: 3px solid white;
  cursor: pointer;
  display: none;
}
.btn-next:hover { background: white; color: black; }

/* ── ÉPREUVE 1 ── */
#ep1 { padding: 20px 0 40px; }
.box {
  border: 6px solid white;
  width: 90%;
  max-width: 600px;
  margin: 40px auto;
  padding: 20px;
}
#text {
  font-size: 12px;
  line-height: 1.8em;
  text-align: left;
  min-height: 300px;
}
#ep1 h3 { margin-top: 20px; font-size: 14px; }
#ep1 input {
  background: black;
  color: white;
  border: 3px solid white;
  padding: 14px;
  font-family: 'Press Start 2P', monospace;
  font-size: 14px;
  width: 90%;
  margin-top: 20px;
}
#ep1 button.validate-btn {
  margin-top: 20px;
  padding: 16px 24px;
  font-family: 'Press Start 2P', monospace;
  font-size: 14px;
  background: black;
  color: white;
  border: 3px solid white;
  cursor: pointer;
}
#ep1 button.validate-btn:hover { background: white; color: black; }
#error1 { margin-top: 20px; font-size: 12px; }

/* ── ÉPREUVE 2 ── */
#ep2 h1 { margin-top: 20px; font-size: 14px; }
body::after {
  content: "";
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: repeating-linear-gradient(
    0deg,
    rgba(255,255,255,0.03),
    rgba(255,255,255,0.03) 1px,
    transparent 1px,
    transparent 3px
  );
  pointer-events: none;
  z-index: 9999;
}
#cameras {
  display: flex;
  justify-content: space-around;
  flex-wrap: wrap;
  max-width: 600px;
  margin: 20px auto;
}
.camera {
  width: 120px;
  height: 160px;
  border: 3px solid white;
  margin: 5px;
  position: relative;
  cursor: pointer;
  background: black;
  overflow: hidden;
}
.animatronique {
  position: absolute;
  top:50%; left:50%;
  transform: translate(-50%,-50%);
  width:100%; height:100%;
  object-fit: contain;
  display: none;
  image-rendering: pixelated;
  filter: grayscale(100%) brightness(200%) contrast(1000%);
  animation: glitch 0.15s infinite;
}
@keyframes glitch {
  0%   { transform: translate(-50%,-50%); }
  50%  { transform: translate(-49%,-51%); }
  100% { transform: translate(-50%,-50%); }
}
#counter2 { font-size: 14px; margin-top: 10px; }

/* ── ÉPREUVE 3 ── */
#ep3 h1 { margin-top: 20px; font-size: 14px; }
#grid3 {
  display: grid;
  grid-template-columns: repeat(6, 50px);
  grid-gap: 5px;
  justify-content: center;
  margin-top: 20px;
}
.cell3 {
  width: 50px;
  height: 50px;
  background: black;
  border: 2px solid white;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 20px;
  font-family: 'Press Start 2P', monospace;
}
.cell3:hover { background: #333; }
#attempts3 { margin-top: 10px; font-size: 12px; }

/* ── ÉPREUVE 4 ── */
#ep4 h1 { margin-top: 20px; font-size: 14px; }
#grid4 {
  display: grid;
  grid-template-columns: repeat(2, 120px);
  grid-gap: 20px;
  justify-content: center;
  margin-top: 20px;
}
.cell4 {
  width: 120px;
  height: 120px;
  background: black;
  border: 3px solid white;
  cursor: pointer;
  transition: all 0.2s;
}
.cell4.active { background: white; }
#score4 { font-size: 14px; margin-top: 10px; }

/* ── ÉPREUVE 5 ── */
#ep5 h1 { margin-top: 20px; font-size: 14px; }
#score5, #timer5 { margin-top: 15px; font-size: 14px; }
#question5 { margin-top: 40px; font-size: 18px; }
#ep5 input {
  margin-top: 20px;
  padding: 10px;
  font-size: 16px;
  width: 150px;
  text-align: center;
  background: black;
  color: white;
  border: 2px solid white;
  font-family: 'Press Start 2P', monospace;
}

/* ── LETTRE FINALE ── */
#final-letter {
  display: none;
  font-size: 160px;
  margin-top: 80px;
  animation: blink 1s infinite;
}

/* ── COMMUN ── */
@keyframes blink {
  0%   { opacity:1; }
  50%  { opacity:0; }
  100% { opacity:1; }
}
.msg-float {
  position: fixed;
  font-size: 14px;
  font-weight: bold;
  pointer-events: none;
  animation: fadeOut 1s forwards;
  font-family: 'Press Start 2P', monospace;
  z-index: 10000;
}
.msg-float.success { color: white; }
.msg-float.fail    { color: white; text-decoration: line-through; }
@keyframes fadeOut {
  0%   { opacity:1; }
  100% { opacity:0; top:0; }
}
.shake { animation: shake 0.3s; }
@keyframes shake {
  0%   { transform:translate(0,0); }
  25%  { transform:translate(5px,-5px); }
  50%  { transform:translate(-5px,5px); }
  75%  { transform:translate(5px,5px); }
  100% { transform:translate(0,0); }
}
</style>
</head>
<body>


<!-- ÉPREUVE 1 — Narrative -->
<div id="ep1" class="epreuve active">
  <div class="box">
    <div id="text"></div>
    <h3>À qui s'adresse le message ?</h3>
    <input type="text" id="answer1" placeholder="Tape ta réponse...">
    <br>
    <button class="validate-btn" onclick="checkAnswer1()">VALIDER</button>
    <div id="error1"></div>
    <button class="btn-next" id="btn1" onclick="goTo(2)">CONTINUER →</button>
  </div>
</div>

let ep2Interval = null;

function goTo(n) {

function showMsg(text, type) {
  const msg = document.createElement('div');
  msg.className = 'msg-float ' + type;
  msg.textContent = text;
  msg.style.left = Math.random() * (window.innerWidth - 150) + 'px';
  msg.style.top  = Math.random() * (window.innerHeight - 60) + 'px';
  document.body.appendChild(msg);
  setTimeout(() => document.body.removeChild(msg), 1000);
}

const fullText = `Bonjour? Boonnjouuur? Heuu, j'ai voulu enregistrer un message pour vous, pour vous aider à vous mettre à l'aise durant votre première nuit. Hummmm, j'ai en réalité travaillé dans ce bureau avant vous. Je finis ma dernière semaine de travail en fait...
Je sais que cela peut être un peu accablant, mais je suis ici pour vous dire que vous n'avez rien à craindre. Heuuu, tout va bien se passer. Maintenant... concentrons nous pour vous aider à aller au bout de votre première semaine. Ok?
Heu, donc, premièrement nous avons une lettre de bienvenue et d'introduction de l'entreprise que je suis censé lire. Heuu, c'est une sorte de paperasse légale, vous savez. "Bienvenue chez Freddy Fazbear's Pizza : un endroit magique pour enfants et adultes, là où la fantaisie et le plaisir prennent vie. Fazbear Entertainment n'est pas responsable des dégâts de propriété ou individus. Dans le cas d'une blessure ou de la mort d'un individu, un rapport de personne disparu sera déposé dans les 90 jours au plus tard ou aussitôt que les locaux auront été nettoyés à fond et les tapis remplacés."
Bla, bla, bla, sur le coup, ceci peut avoir un mauvais air, mais je vous assure qu'il n'y a pas de quoi s'inquiéter. Heu, les animatroniques sont un peu bizarres pendant la nuit mais est-ce que je dois les disputer ? Non. Si j'étais forcé de chanter encore et encore ces stupides chansons pendant 20 ans sans jamais avoir de bain? Je serais sûrement irritable durant la nuit aussi. Donc n'oubliez pas, ces personnages occupent une place dans le cœur des enfants, donc nous pouvons leur montrer un peu de respect, pas vrai? Ok.
Bien soyez averti: les dits-personnages ont tendance à errer un peu partout dans le restaurant. Heu, ils ont une sorte de « mode itinérance-libre » qui s'active durant la nuit. Heuuu... Quelque chose dans leur système se bloque lorsqu'ils sont trop longtemps en inactivité. Heuu, ils pouvaient se déplacer aussi pendant la journée. Puis s'est produit la Morsure de 87. Ouais. C-C'est incroyable que le corps humain puisse vivre sans son lobe frontal, n'est ce pas ?
Euh, maintenant concernant votre sécurité : le seul "vrai" risque que vous courez en tant que gardien de nuit ici, dans le cas échéant, sont les animatroniques, heuuu, s'ils vous aperçoivent après les heures d'ouverture, ils ne vous reconnaîtront pas en tant qu'une personne. Ils-Ils vous verront surtout comme un endosquelette sans son costume. Étant donné que c'est contre les règles de Freddy Fazbear's Pizza, ils essayeront probablement de... de vous enfoncer avec force dans un costume de Freddy Fazbear. Hummm, ça ne serait pas si problématique si les costumes eux mêmes n'étaient pas remplis de poutrelles métalliques, de fils électriques et d'autres pièces animatroniques, plus particulièrement au niveau du visage. Donc, imaginez ce que pourrais être l'expérience de se faire enfoncer la tête dans l'un de ces costumes, cela pourrait créer un sensation d'inconfort... et la mort. Heuu, les seuls parties qui verront la lumière du jour serait vos yeux et vos dents qui seraient éjectés du masque, ouais. O-Ouais, ils ne vous informent pas de ce genre de chose lorsque vous postulez. Mais hey, le premier jour n'est qu'une petite brise, je vais communiquer avec vous demain, heuu, regardez les caméras, et ne fermez les portes qu'en cas de stricte nécessitée, pour conserver l'électricité. Bien, c'est tout pour ce soir et bonne nuit !`;

let typingIndex = 0;

}

function initEp2() {
  if (ep2Interval) clearInterval(ep2Interval);

  document.querySelectorAll('.camera').forEach(cam => {
    const newCam = cam.cloneNode(true);
    cam.parentNode.replaceChild(newCam, cam);
  });

  const cameras2 = document.querySelectorAll('.camera');
  let currentId2 = -1;
  let success2 = 0;
  const counter2 = document.getElementById('counter2');
  counter2.textContent = 'Succès : 0 / 10';
  document.getElementById('btn2').style.display = 'none';

  function hideAll2() {
    cameras2.forEach(c => c.querySelector('.animatronique').style.display = 'none');
  }
  function spawn2() {
    hideAll2();
    currentId2 = Math.floor(Math.random() * cameras2.length);
    cameras2[currentId2].querySelector('.animatronique').style.display = 'block';
    setTimeout(() => {
      if (cameras2[currentId2]) cameras2[currentId2].querySelector('.animatronique').style.display = 'none';
      currentId2 = -1;
    }, 1200);
  }

  cameras2.forEach(cam => {
    cam.addEventListener('click', () => {
      const id = parseInt(cam.dataset.id);
      if (id === currentId2) {
        success2++;
        counter2.textContent = `Succès : ${success2} / 10`;
        showMsg("+1", "success");
        if (success2 >= 10) {
          hideAll2();
          clearInterval(ep2Interval);
          document.getElementById("btn2").style.display = "inline-block";
        } else {
          spawn2();
        }
      } else {
        success2 = Math.max(0, success2 - 1);
        counter2.textContent = `Succès : ${success2} / 10`;
        showMsg("raté", "fail");
      }
    });
  });

  spawn2();
  ep2Interval = setInterval(() => { if (success2 < 10) spawn2(); }, 1500);
}

function initEp3() {
  const grid3 = document.getElementById('grid3');
  grid3.innerHTML = '';
  document.getElementById('btn3').style.display = 'none';

  let attemptsLeft3 = 5;
  document.getElementById('attempts3').textContent = `Tentatives restantes : ${attemptsLeft3}`;
  const correctIndex3 = Math.floor(Math.random() * 30);

  for (let i = 0; i < 30; i++) {
    const div = document.createElement('div');
    div.className = 'cell3';
    grid3.appendChild(div);
    div.addEventListener('click', () => {
      if (div.classList.contains('clicked')) return;
      div.classList.add('clicked');
      if (i === correctIndex3) {
        div.textContent = '✓';
        div.style.color = 'white';
        document.getElementById('btn3').style.display = 'inline-block';
      } else {
        div.textContent = 'X';
        div.style.color = 'white';
        attemptsLeft3--;
        document.getElementById('attempts3').textContent = `Tentatives restantes : ${attemptsLeft3}`;
        if (attemptsLeft3 <= 0) setTimeout(initEp3, 500);
      }
    });
  }
}

function initEp4() {
  document.getElementById('btn4').style.display = 'none';
  const scoreEl4 = document.getElementById('score4');
  scoreEl4.textContent = 'Score : 0 / 10';

  document.querySelectorAll('.cell4').forEach(cell => {
    const newCell = cell.cloneNode(true);
    cell.parentNode.replaceChild(newCell, cell);
  });
  const cells4 = document.querySelectorAll('.cell4');

  let sequence4 = [];
  let playerSequence4 = [];
  let currentScore4 = 0;

  function nextStep4() {
    sequence4.push(Math.floor(Math.random() * cells4.length));
    playerSequence4 = [];
    playSequence4();
  }
  function playSequence4() {
    sequence4.forEach((id, i) => {
      setTimeout(() => {
        cells4[id].classList.add('active');
        setTimeout(() => cells4[id].classList.remove('active'), 500);
      }, i * 700);
    });
  }
  function resetGame4() {
    sequence4 = [];
    playerSequence4 = [];
    currentScore4 = 0;
    scoreEl4.textContent = 'Score : 0 / 10';
    showMsg("reset", "fail");
    nextStep4();
  }
  function checkPlayer4(id) {
    playerSequence4.push(id);
    const idx = playerSequence4.length - 1;
    if (playerSequence4[idx] !== sequence4[idx]) {
      showMsg("raté", "fail");
      setTimeout(resetGame4, 800);
      return;
    }
    if (playerSequence4.length === sequence4.length) {
      currentScore4++;
      scoreEl4.textContent = `Score : ${currentScore4} / 10`;
      showMsg("+1 point", "success");
      if (currentScore4 >= 10) {
        document.getElementById('btn4').style.display = 'inline-block';
        return;
      }
      setTimeout(nextStep4, 800);
    }
  }

  cells4.forEach(cell => {
    cell.addEventListener('click', () => {
      const id = parseInt(cell.dataset.id);
      cell.classList.add('active');
      setTimeout(() => cell.classList.remove('active'), 200);
      checkPlayer4(id);
    });
  });

  nextStep4();
}

/* ══════════════════
   ÉPREUVE 5
══════════════════ */
function initEp5() {
  const questionEl5 = document.getElementById("question5");
  const timerEl5    = document.getElementById("timer5");
  const scoreEl5    = document.getElementById("score5");
  const finalLetter = document.getElementById("final-letter");

  const oldInput = document.getElementById("answer5");
  const newInput = oldInput.cloneNode(true);
  oldInput.parentNode.replaceChild(newInput, oldInput);
  const inp5 = document.getElementById("answer5");

  finalLetter.style.display = "none";
  timerEl5.style.display = "block";
  scoreEl5.style.display = "block";
  inp5.style.display = "inline-block";

  let questions5 = [];
  let currentIndex5 = 0;
  let score5 = 0;
  let timeLeft5 = 20;
  let interval5;

  function generateQuestion5() {
    const ops = ["+", "-", "*", "/"];
    const op = ops[Math.floor(Math.random() * ops.length)];
    let a = Math.floor(Math.random() * 10) + 1;
    let b = Math.floor(Math.random() * 9) + 1;
    if (op === "/") { a = a * b; }
    if (b > a) { [a, b] = [b, a]; }
    let result;
    switch (op) {
      case "+": result = a + b; break;
      case "-": result = a - b; break;
      case "*": result = a * b; break;
      case "/": result = a / b; break;
    }
    return { text: `${a} ${op} ${b}`, answer: result };
  }

  function startGame5() {
    clearInterval(interval5);
    questions5 = [];
    currentIndex5 = 0;
    score5 = 0;
    timeLeft5 = 20;
    inp5.value = "";
    for (let i = 0; i < 14; i++) questions5.push(generateQuestion5());
    questions5.push({ text: "on naît avec rien + on repart avec ...", answer: 0 });
    updateUI5();
    showQuestion5();
    inp5.focus();
    interval5 = setInterval(() => {
      timeLeft5--;
      timerEl5.textContent = "Temps : " + timeLeft5;
      if (timeLeft5 <= 0) startGame5();
    }, 1000);
  }

  function updateUI5() {
    scoreEl5.textContent = "Score : " + score5 + " / 15";
    timerEl5.textContent = "Temps : " + timeLeft5;
  }
  function showQuestion5() {
    questionEl5.textContent = questions5[currentIndex5].text;
  }

  inp5.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
      const userAnswer = Number(inp5.value);
      if (userAnswer === questions5[currentIndex5].answer) {
        score5++;
        currentIndex5++;
        timeLeft5 += 5;
        document.body.classList.add("shake");
        setTimeout(() => document.body.classList.remove("shake"), 300);
        inp5.value = "";
        updateUI5();
        if (currentIndex5 >= questions5.length) {
          clearInterval(interval5);
          questionEl5.textContent = "";
          inp5.style.display = "none";
          timerEl5.style.display = "none";
          scoreEl5.style.display = "none";
          finalLetter.style.display = "block";
          saveLetter("I");
          setTimeout(() => {
            window.location.href = "https://bachamoha05-rgb.github.io/finalstep/";
          }, 4000);
        } else {
          showQuestion5();
        }
      } else {
        inp5.value = "";
      }
    }
  });

  startGame5();
}
</script>
